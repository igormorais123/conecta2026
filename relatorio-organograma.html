function idDe(tipo, nome) {
    return tipo + '_' + nome.replace(/\s+/g, '_').toLowerCase();
}

function obterRegistro(tipo, nome) {
    var id = idDe(tipo, nome);
    return DADOS[id] || null;
}

function renderItem(cargo, opts) {
    opts = opts || {};
    var nome = opts.nomeForcado || '';
    var telefone = '';
    var extras = [];
    var cargoClass = opts.amplo ? 'cargo amplo' : 'cargo';

    if (!nome && opts.tipoLS && opts.nomeChave) {
        var reg = obterRegistro(opts.tipoLS, opts.nomeChave);
        if (reg) {
            nome = (reg.nome || '').trim();
            telefone = (reg.telefone || '').trim();
            if (Array.isArray(reg.pessoas_extras)) {
                reg.pessoas_extras.forEach(function(p) {
                    var t = (p.nome || '').trim();
                    if (t) extras.push({ nome: t, telefone: (p.telefone || '').trim() });
                });
            }
        }
    }

    var preenchido = nome && nome !== '(A definir)';
    var classe = preenchido ? 'item preenchido' : 'item vazio';
    var nomeBox = preenchido ? nome : '';
    var telBox = preenchido && telefone ? telefone : (preenchido ? '<span class="label-mini">Tel:</span>' : '');

    var html = '<div class="' + classe + '">' +
        '<div class="' + cargoClass + '">' + cargo + '</div>' +
        '<div class="campos">' +
        '<div class="nome-box">' + escapar(nomeBox) + '</div>' +
        '<div class="tel-box">' + telBox + '</div>' +
        '</div>' +
        '</div>';

    if (extras.length > 0) {
        html += '<div class="contatos-extras">';
        html += '<div class="extra-titulo">+ Pessoas adicionais cadastradas</div>';
        extras.forEach(function(p) {
            html += '<div class="extra-pessoa">• ' + escapar(p.nome) + (p.telefone ? ' — ' + escapar(p.telefone) : '') + '</div>';
        });
        html += '</div>';
    }

    return html;
}

function renderPessoasLista(cidadeChave) {
    var lista = PESSOAS[cidadeChave];
    if (!lista || lista.length === 0) return '';
    var html = '<div class="contatos-extras">';
    html += '<div class="extra-titulo">📞 Contatos cadastrados nesta cidade</div>';
    lista.forEach(function(p) {
        var n = (p.nome || '').trim();
        if (!n) return;
        var t = (p.telefone || '').trim();
        var e = (p.email || '').trim();
        html += '<div class="extra-pessoa">• ' + escapar(n);
        if (t) html += ' — ' + escapar(t);
        if (e) html += ' · ' + escapar(e);
        html += '</div>';
    });
    html += '</div>';
    return html;
}

function escapar(s) {
    if (!s) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

        'Cruzeiro': 'cruzeiro', 'Candangolândia': 'candangolandia',
        'Núcleo Bandeirantes': 'nucleobandeirante',
        'Samambaia': 'samambaia', 'Recanto das Emas': 'recantodasemas', 'Água Quente': 'aguaquente',
        'Ceilândia': 'ceilandia', 'Sol Nascente': 'solnascente',
        'Valparaíso': 'valparaiso', 'Luziânia': 'luziania', 'Cidade Ocidental': 'cidadeocidental',
        'Park Way': 'parkway', 'Arapoanga': 'arapoanga', 'Varjão': 'varjao',
        'Granja do Torto': 'granjadotorto', 'Taquari': 'taquari',
        'Novo Gama': 'novogama', 'Pedregal': 'pedregal',
        'Jardim Mangueiral': 'jardimmangueiral'
    };
    return mapa[cidadeNome] || null;
}

function render() {
    DADOS = JSON.parse(localStorage.getItem('organograma_dados') || '{}');
    PESSOAS = JSON.parse(localStorage.getItem('organograma_pessoas') || '{}');

    var total = Object.keys(DADOS).length + Object.keys(PESSOAS).length;
    var aviso = document.getElementById('aviso-dados');
    aviso.innerHTML = '';
    if (total === 0) {
        aviso.innerHTML = '<div class="pagina"><div class="nota alerta"><strong>⚠️ Nenhum dado carregado.</strong><br>' +
            'Para que os nomes cadastrados apareçam, abra este relatório no mesmo navegador onde você usa o organograma. ' +
            'Acesse em <strong>inteia.com.br/conecta2026/relatorio-organograma.html</strong> depois do deploy automático (~10 min).</div></div>';
    }

    var html = '';

    // CAPA
    html += '<div class="pagina capa">' +
        '<h1>ORGANOGRAMA</h1>' +
        '<h2>Campanha Celina Leão 2026</h2>' +
        '<div class="subtitulo"><strong>Relatório de Coordenadores</strong><br>' +
        'Nomes cadastrados + espaços para preencher à mão</div>' +
        '<div class="data">Distrito Federal · Eleição 2026<br>Gerado em ' + new Date().toLocaleDateString('pt-BR') + '</div>' +
        '</div>';

    // INSTRUÇÕES
    html += '<div class="pagina">' +
        '<h2 class="secao">Como usar este relatório</h2>' +
        '<div class="nota"><strong>Objetivo:</strong> imprimir e preencher à mão os nomes/telefones em aberto. ' +
        'Os nomes já cadastrados no sistema aparecem destacados em laranja com ✓.</div>' +
        '<div class="legenda">' +
        '<span class="v"><strong>Preenchido</strong> — já cadastrado no sistema</span>' +
        '<span class="o"><strong>Em aberto</strong> — preencher manualmente</span>' +
        '</div></div>';

    // 1. COORDENAÇÃO GERAL + COORDENAÇÕES + SUBCOORDS
    html += '<div class="pagina">';
    html += '<h2 class="secao">1. Coordenação Geral</h2>';
    html += renderItem('Coordenação Geral', { nomeForcado: 'Celina Leão' });
    html += '<h2 class="secao">2. Coordenações Gerais</h2>';
    COORDS_GERAIS.forEach(function(c) {
        html += renderItem(c[0], { nomeForcado: c[1] });
    });
    html += '<h2 class="secao">3. Subcoordenações da Logística</h2>';
    SUBCOORDS_LOGISTICA.forEach(function(s) {
        html += renderItem(s, { tipoLS: 'regiao', nomeChave: s });
    });
    html += '</div>';

    // 4. COORDENAÇÕES REGIONAIS
    html += '<div class="pagina"><h2 class="secao">4. Coordenações Regionais</h2></div>';
    REGIOES.forEach(function(reg) {
        html += '<div class="pagina">';
        html += '<h3 class="subsecao">🟣 ' + reg.nome + '</h3>';
        html += renderItem('Coord. Estratégica', { amplo: true, tipoLS: 'regiao', nomeChave: reg.nome });
        reg.cidades.forEach(function(cid) {
            html += '<h5 class="cidade">' + cid.nome + '</h5>';
            html += renderItem('Coord. Setorial', { tipoLS: 'cidade', nomeChave: cid.nome });
            // contatos da cidade (organograma_pessoas)
            var chPessoas = cidadeChaveDoOrganograma(cid.nome);
            if (chPessoas) html += renderPessoasLista(chPessoas);
            // bases
            (cid.bases || []).forEach(function(b) {
                html += renderItem(b, { tipoLS: 'base', nomeChave: b });
            });
        });
        html += '</div>';
    });

    // 5. SEGMENTOS SOCIAIS
    html += '<div class="pagina">';
    html += '<h2 class="secao">5. Coordenação de Segmentos Sociais</h2>';
    html += '<div class="nota">Coordenadora: <strong>Maria Célia</strong></div>';
    SEGMENTOS_GRUPOS.forEach(function(grp, i) {
        if (i > 0 && i % 3 === 0) html += '</div><div class="pagina">';
        html += '<h4 class="regiao">' + grp[0] + '</h4>';
        grp[1].forEach(function(seg) {
            var nomeHTML = SEGMENTOS_HTML[seg];
            if (nomeHTML) {
                html += renderItem(seg, { nomeForcado: nomeHTML, tipoLS: 'segmento', nomeChave: seg });
            } else {
                html += renderItem(seg, { tipoLS: 'segmento', nomeChave: seg });
            }
        });
    });
    html += '</div>';

    // 6. COORDENAÇÃO RURAL
    html += '<div class="pagina">';
    html += '<h2 class="secao">6. Coordenação Rural</h2>';
    html += '<div class="nota">Coordenadores: <strong>Márcio Leão e Sérgio Leão</strong></div>';
    // Pessoas extras cadastradas no rural
    if (PESSOAS['rural'] && PESSOAS['rural'].length > 0) {
        html += renderPessoasLista('rural');
    }
    RURAL.forEach(function(reg, i) {
        if (i > 0 && i % 2 === 0) html += '</div><div class="pagina">';
        html += '<h3 class="subsecao">🟢 ' + reg.nome + '</h3>';
        html += renderItem('Coord. Estratégica', { amplo: true, tipoLS: 'regiao', nomeChave: reg.nome });
        reg.cidades.forEach(function(cid) {
            html += renderItem(cid.nome, { tipoLS: 'cidade', nomeChave: cid.nome });
        });
    });
    html += '</div>';

    // AGENDA EXTRA + OBSERVAÇÕES
    html += '<div class="pagina">';
    html += '<h2 class="secao">📅 Agenda da Campanha</h2>';
    if (PESSOAS['agenda'] && PESSOAS['agenda'].length > 0) {
        html += '<div class="nota">Contatos já cadastrados na Agenda:</div>';
        html += renderPessoasLista('agenda');
    }
    html += '<div class="nota">Use o espaço abaixo para anotar contatos avulsos:</div>';
    for (var k = 1; k <= 10; k++) {
        html += '<div class="item vazio"><div class="cargo">Contato ' + k + '</div>' +
            '<div class="campos"><div class="nome-box"></div><div class="tel-box"></div></div></div>';
    }
    html += '<h2 class="secao" style="margin-top:40px;">Observações Gerais</h2>';
    html += '<div style="border: 1px solid #ccc; min-height: 200px; padding: 14px; background: #fafafa; border-radius: 6px;"></div>';
    html += '</div>';

    document.getElementById('conteudo').innerHTML = html;
}

function recarregarDados() {
    render();
    alert('Dados recarregados do navegador!');
}

render();
</script>

</html>
