<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta - CONECTA 2026</title>
    <link rel="manifest" id="manifestLink" href="manifest.json">
    <link rel="icon" id="faviconLink" href="icons/favicon.svg" type="image/svg+xml">
    <meta name="theme-color" content="#1a237e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CONECTA">
    <link rel="apple-touch-icon" id="appleTouchIcon" href="icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="js/supabase-config.js"></script>
    <script src="js/conecta-db.js"></script>
    <script>
        (function initPwaAssets() {
            var cfg = window.CONECTA_CONFIG || {};
            var basePath = cfg.basePath || './';
            var manifestLink = document.getElementById('manifestLink');
            var faviconLink = document.getElementById('faviconLink');
            var appleTouchIcon = document.getElementById('appleTouchIcon');

            if (manifestLink) {
                manifestLink.href = basePath + 'manifest.json';
            }
            if (faviconLink) {
                faviconLink.href = basePath + 'icons/favicon.svg';
            }
            if (appleTouchIcon) {
                appleTouchIcon.href = basePath + 'icons/icon-192.png';
            }

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register(basePath + 'service-worker.js').catch(function(error) {
                        console.warn('Falha ao registrar service worker do CONECTA:', error);
                    });
                });
            }
        })();
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            padding: 24px;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: #1e293b;
            background:
                radial-gradient(circle at top left, rgba(26, 35, 126, 0.12), transparent 25%),
                radial-gradient(circle at bottom right, rgba(255, 111, 0, 0.10), transparent 25%),
                #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            width: 100%;
            max-width: 520px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            box-shadow: 0 12px 40px rgba(26, 35, 126, 0.14);
            padding: 32px 28px;
        }
        h1 {
            font-size: 1.5rem;
            color: #1a237e;
            margin-bottom: 6px;
        }
        .subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .panel {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.82rem;
            font-weight: 600;
        }
        .field {
            margin-bottom: 16px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #dbe3ee;
            border-radius: 8px;
            font: inherit;
            background: #fff;
            color: #1e293b;
            outline: none;
        }
        input:focus {
            border-color: #1a237e;
            box-shadow: 0 0 0 3px rgba(26, 35, 126, 0.10);
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        button, a.button-link {
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            font: 600 0.9rem 'Inter', 'Segoe UI', sans-serif;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .primary { background: #1a237e; color: #fff; }
        .secondary { background: #fff; color: #1a237e; border: 1.5px solid #dbe3ee; }
        .danger { background: #b91c1c; color: #fff; }
        .message {
            display: none;
            margin-top: 18px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .message.error {
            display: block;
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        .message.success {
            display: block;
            background: #f0fdf4;
            color: #15803d;
            border: 1px solid #bbf7d0;
        }
        .footer {
            margin-top: 24px;
            text-align: center;
            color: #64748b;
            font-size: 0.74rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Minha Conta</h1>
        <div class="subtitle">Atualize sua senha e gerencie sua sessao.</div>

        <div class="panel">
            <strong>Usuario logado:</strong> <span id="profileName">Carregando...</span><br>
            <strong>E-mail interno:</strong> <span id="profileEmail">Carregando...</span>
        </div>

        <div class="field">
            <label class="label" for="newPassword">Nova senha</label>
            <input type="password" id="newPassword" autocomplete="new-password" placeholder="Digite uma nova senha">
        </div>

        <div class="field">
            <label class="label" for="confirmPassword">Confirmar nova senha</label>
            <input type="password" id="confirmPassword" autocomplete="new-password" placeholder="Repita a nova senha">
        </div>

        <div class="actions">
            <button class="primary" id="saveButton" type="button">Alterar senha</button>
            <a class="button-link secondary" id="linkVoltar" href="CONECTA.html">Voltar ao CONECTA</a>
            <button class="danger" id="logoutButton" type="button">Sair</button>
        </div>

        <div id="message" class="message"></div>

        <div class="footer">
            Implementado por INTEIA - Inteligencia Estrategica Eleitoral<br>
            Sistema desenvolvido por Silvio Morais Vieira
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        var messageEl = document.getElementById('message');
        var saveButton = document.getElementById('saveButton');
        var logoutButton = document.getElementById('logoutButton');
        var nameEl = document.getElementById('profileName');
        var emailEl = document.getElementById('profileEmail');
        var newPasswordEl = document.getElementById('newPassword');
        var confirmPasswordEl = document.getElementById('confirmPassword');

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
        }

        function clearMessage() {
            messageEl.textContent = '';
            messageEl.className = 'message';
        }

        async function requireSession() {
            await ConectaDB.init();
            var user = await ConectaDB.getUser();
            if (!user) {
                window.location.href = (window.CONECTA_CONFIG && window.CONECTA_CONFIG.loginPath) || 'login.html';
                return null;
            }
            return user;
        }

        async function loadProfile() {
            var user = await requireSession();
            if (!user) return;

            var profile = await ConectaDB.getUserProfile();
            nameEl.textContent = profile && profile.nome ? profile.nome : user.email;
            emailEl.textContent = user.email || '-';
        }

        saveButton.addEventListener('click', async function() {
            clearMessage();
            var newPassword = newPasswordEl.value;
            var confirmPassword = confirmPasswordEl.value;

            if (newPassword.length < 8) {
                showMessage('A nova senha precisa ter pelo menos 8 caracteres.', 'error');
                return;
            }
            if (newPassword !== confirmPassword) {
                showMessage('As senhas nao conferem.', 'error');
                return;
            }

            if (!window.CONECTA_SUPABASE) {
                showMessage('Supabase nao configurado.', 'error');
                return;
            }

            saveButton.disabled = true;
            saveButton.textContent = 'Salvando...';

            try {
                var result = await window.CONECTA_SUPABASE.auth.updateUser({ password: newPassword });
                if (result.error) {
                    showMessage(result.error.message, 'error');
                    return;
                }
                newPasswordEl.value = '';
                confirmPasswordEl.value = '';
                showMessage('Senha alterada com sucesso.', 'success');
            } catch (error) {
                showMessage('Nao foi possivel alterar a senha.', 'error');
            } finally {
                saveButton.disabled = false;
                saveButton.textContent = 'Alterar senha';
            }
        });

        logoutButton.addEventListener('click', function() {
            ConectaDB.logout();
        });

        // Ajustar link de volta
        var cfg = window.CONECTA_CONFIG || {};
        var linkVoltar = document.getElementById('linkVoltar');
        if (linkVoltar && cfg.appPath) linkVoltar.href = cfg.appPath;

        if (window.CONECTA_SUPABASE || window._conectaSupabaseError) {
            loadProfile();
        } else {
            window.addEventListener('supabase-ready', loadProfile, { once: true });
        }
    })();
    </script>
</body>
</html>
