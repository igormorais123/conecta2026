name: Deploy to Vercel

on:
  push:
    branches: [master, main]
  # Cron: roda a cada 15 minutos para garantir sincronização
  schedule:
    - cron: '*/15 * * * *'
  # Permite rodar manualmente pelo GitHub
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar segredos do Vercel
        id: check-secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "has_vercel=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy direto ignorado - segredos Vercel não configurados neste repositório"
          else
            echo "has_vercel=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Instalar Vercel CLI
        if: steps.check-secrets.outputs.has_vercel == 'true'
        run: npm install -g vercel

      - name: Deploy para Produção
        if: steps.check-secrets.outputs.has_vercel == 'true'
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
