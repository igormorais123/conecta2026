name: Notificar Deploy

on:
  push:
    branches: [main]

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar segredos do deploy
        id: check-deploy
        run: |
          if [ -z "${{ secrets.DEPLOY_TOKEN }}" ] || [ -z "${{ secrets.DEPLOY_REPO }}" ]; then
            echo "::notice::DEPLOY_TOKEN e DEPLOY_REPO não configurados; disparo para repo de produção ignorado."
            echo "can_dispatch=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "can_dispatch=true" >> "$GITHUB_OUTPUT"

      - name: Disparar deploy no repo de producao
        if: steps.check-deploy.outputs.can_dispatch == 'true'
        run: |
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            https://api.github.com/repos/${{ secrets.DEPLOY_REPO }}/dispatches \
            -d '{"event_type":"conecta-sync","client_payload":{"ref":"${{ github.sha }}"}}'
      - name: Confirmar disparo
        if: steps.check-deploy.outputs.can_dispatch == 'true'
        run: echo "Deploy disparado para ${{ github.sha }}"
