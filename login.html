<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CONECTA Celina Leao 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #1a237e;
            --primary-light: #283593;
            --primary-dark: #0d1547;
            --accent: #ff6f00;
            --accent-light: #ff8f00;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --error: #dc2626;
            --error-bg: #fef2f2;
            --success: #16a34a;
            --success-bg: #f0fdf4;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(26, 35, 126, 0.10);
            --shadow-lg: 0 8px 40px rgba(26, 35, 126, 0.15);
        }

        html {
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(26, 35, 126, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 111, 0, 0.04) 0%, transparent 50%);
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 4px;
            margin-bottom: 4px;
        }

        .login-header .subtitle {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .login-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 36px 32px;
            border: 1px solid var(--border);
        }

        .login-card h2 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: #fafbfc;
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 35, 126, 0.10);
            background: #fff;
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        .btn {
            width: 100%;
            padding: 13px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 2px 8px rgba(26, 35, 126, 0.25);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-light);
            box-shadow: 0 4px 12px rgba(26, 35, 126, 0.30);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid var(--border);
            margin-top: 10px;
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(26, 35, 126, 0.04);
            border-color: var(--primary);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 0.78rem;
            font-weight: 500;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .message {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.84rem;
            font-weight: 500;
            margin-bottom: 16px;
            display: none;
            line-height: 1.4;
        }

        .message.error {
            background: var(--error-bg);
            color: var(--error);
            border: 1px solid #fecaca;
            display: block;
        }

        .message.success {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid #bbf7d0;
            display: block;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        .btn-secondary .spinner {
            border-color: rgba(26, 35, 126, 0.2);
            border-top-color: var(--primary);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px;
            }
            .login-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-header">
        <h1>CONECTA</h1>
        <div class="subtitle">Celina Le&atilde;o 2026</div>
    </div>

    <div class="login-card">
        <h2>Acesse o sistema</h2>

        <div id="message" class="message"></div>

        <form id="loginForm" autocomplete="on">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary" id="btnLogin">
                <span class="spinner" id="spinnerLogin"></span>
                <span id="btnLoginText">Entrar</span>
            </button>
        </form>

        <div class="divider">ou</div>

        <button type="button" class="btn btn-secondary" id="btnMagicLink">
            <span class="spinner" id="spinnerMagic"></span>
            <span id="btnMagicText">Entrar com link m&aacute;gico</span>
        </button>
    </div>

    <div class="login-footer">
        Sistema de campanha &mdash; Acesso restrito
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// CONFIGURACAO — Substitua pelos valores do seu projeto Supabase
var SUPABASE_URL = window.CONECTA_SUPABASE_URL || 'https://SEU-PROJETO.supabase.co';
var SUPABASE_ANON_KEY = window.CONECTA_SUPABASE_KEY || 'SUA-ANON-KEY-AQUI';

(function() {
    'use strict';

    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var elMessage   = document.getElementById('message');
    var elForm      = document.getElementById('loginForm');
    var elEmail     = document.getElementById('email');
    var elPassword  = document.getElementById('password');
    var btnLogin    = document.getElementById('btnLogin');
    var btnMagic    = document.getElementById('btnMagicLink');
    var spinLogin   = document.getElementById('spinnerLogin');
    var spinMagic   = document.getElementById('spinnerMagic');
    var txtLogin    = document.getElementById('btnLoginText');
    var txtMagic    = document.getElementById('btnMagicText');

    var REDIRECT_URL = '/conecta/';

    // ---------- Helpers ----------

    function showMsg(text, type) {
        elMessage.textContent = text;
        elMessage.className = 'message ' + type;
    }

    function clearMsg() {
        elMessage.className = 'message';
        elMessage.textContent = '';
    }

    function setLoading(btn, spinner, txtEl, loading, originalText) {
        btn.disabled = loading;
        spinner.style.display = loading ? 'inline-block' : 'none';
        txtEl.textContent = loading ? 'Aguarde...' : originalText;
    }

    // ---------- Check existing session ----------

    sb.auth.getSession().then(function(result) {
        if (result.data.session) {
            window.location.href = REDIRECT_URL;
        }
    });

    // ---------- Listen for auth state changes (magic link callback) ----------

    sb.auth.onAuthStateChange(function(event, session) {
        if (event === 'SIGNED_IN' && session) {
            window.location.href = REDIRECT_URL;
        }
    });

    // ---------- Login with password ----------

    elForm.addEventListener('submit', function(e) {
        e.preventDefault();
        clearMsg();

        var email = elEmail.value.trim();
        var password = elPassword.value;

        if (!email || !password) {
            showMsg('Preencha e-mail e senha.', 'error');
            return;
        }

        setLoading(btnLogin, spinLogin, txtLogin, true, 'Entrar');
        btnMagic.disabled = true;

        sb.auth.signInWithPassword({ email: email, password: password })
            .then(function(result) {
                if (result.error) {
                    var msg = result.error.message;
                    if (msg === 'Invalid login credentials') {
                        msg = 'E-mail ou senha incorretos.';
                    }
                    showMsg(msg, 'error');
                    setLoading(btnLogin, spinLogin, txtLogin, false, 'Entrar');
                    btnMagic.disabled = false;
                } else {
                    window.location.href = REDIRECT_URL;
                }
            })
            .catch(function(err) {
                showMsg('Erro de conexao. Tente novamente.', 'error');
                setLoading(btnLogin, spinLogin, txtLogin, false, 'Entrar');
                btnMagic.disabled = false;
            });
    });

    // ---------- Magic link ----------

    btnMagic.addEventListener('click', function() {
        clearMsg();

        var email = elEmail.value.trim();
        if (!email) {
            showMsg('Digite seu e-mail para receber o link.', 'error');
            elEmail.focus();
            return;
        }

        setLoading(btnMagic, spinMagic, txtMagic, true, 'Entrar com link magico');
        btnLogin.disabled = true;

        sb.auth.signInWithOtp({
            email: email,
            options: {
                emailRedirectTo: window.location.origin + '/conecta/'
            }
        })
        .then(function(result) {
            if (result.error) {
                showMsg(result.error.message, 'error');
            } else {
                showMsg('Link enviado para ' + email + '. Verifique sua caixa de entrada.', 'success');
            }
            setLoading(btnMagic, spinMagic, txtMagic, false, 'Entrar com link magico');
            btnLogin.disabled = false;
        })
        .catch(function(err) {
            showMsg('Erro de conexao. Tente novamente.', 'error');
            setLoading(btnMagic, spinMagic, txtMagic, false, 'Entrar com link magico');
            btnLogin.disabled = false;
        });
    });

})();
</script>

</body>
</html>
